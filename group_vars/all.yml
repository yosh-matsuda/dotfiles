home_dir: "{{ ansible_facts['env']['HOME'] }}"
xdg_config_home: "{{ home_dir }}/.config"
xdg_local_bin_dir: "{{ home_dir }}/.local/bin"
xdg_data_home: "{{ home_dir }}/.local/share"
xdg_cache_home: "{{ home_dir }}/.cache"
local_tmp_dir: "{{ home_dir }}/tmp"
dotfiles_repo_url: https://github.com/yosh-matsuda/dotfiles.git
is_ubuntu: "{{ ansible_facts['distribution'] == 'Ubuntu' }}"
is_macos: "{{ ansible_facts['distribution'] == 'MacOSX' }}"
is_x86_64: "{{ ansible_facts['architecture'] == 'x86_64' }}"
is_arm64: "{{ ansible_facts['architecture'] == 'arm64' }}"
is_wsl: "{{ is_ubuntu and 'WSL' in ansible_facts['kernel'] }}"
brew_linux_prerequisite_packages:
- build-essential
- procps
- curl
- file
- git
brew_packages:
- fish
- fzf
- bat
- eza
brew_binary_path: >-
  {{
    '/home/linuxbrew/.linuxbrew/bin/brew' if is_ubuntu
    else '/usr/local/bin/brew' if is_macos and is_x86_64
    else '/opt/homebrew/bin/brew' if is_macos and is_arm64
    else none
  }}
brew_bin_dir: "{{ brew_binary_path | dirname if brew_binary_path is not none else none }}"
pipx_packages:
- cmakelang
- compdb
- invoke
prerequisite_apt_packages:
- git
- pipx
- sysstat
- tmux
- curl
# For C++ development
- build-essential
- cmake
- zip
- pkg-config
- ninja-build
- libicu-dev
