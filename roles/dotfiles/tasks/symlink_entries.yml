- name: Find entries to link
  ansible.builtin.find:
    paths: "{{ dotfiles_link_source_path }}"
    recurse: false
    hidden: "{{ dotfiles_link_hidden | default(false) }}"
    file_type: "{{ dotfiles_link_file_type | default('any') }}"
  register: dotfiles_link_sources

- name: Check existing destinations
  ansible.builtin.stat:
    path: "{{ dotfiles_link_dest_dir }}/{{ item.path | basename }}"
    follow: false
  loop: "{{ dotfiles_link_sources.files }}"
  loop_control:
    label: "{{ dotfiles_link_dest_dir }}/{{ item.path | basename }}"
  register: dotfiles_link_destinations

- name: Back up existing destinations before relinking
  when: >-
    dotfiles_link_backup_existing | default(false) and item.stat.exists and not item.stat.islnk | default(false)
  ansible.builtin.command:
    argv:
    - mv
    - "{{ dotfiles_link_dest_dir }}/{{ item.item.path | basename }}"
    - "{{ dotfiles_link_dest_dir }}/{{ item.item.path | basename }}.ansible.bak.{{ lookup('pipe', 'date +%s%N') }}"
  loop: "{{ dotfiles_link_destinations.results }}"
  loop_control:
    label: "{{ dotfiles_link_dest_dir }}/{{ item.item.path | basename }}"

- name: Link entries into destination directory
  ansible.builtin.file:
    src: "{{ item.path | relpath(dotfiles_link_dest_dir) }}"
    dest: "{{ dotfiles_link_dest_dir }}/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ dotfiles_link_sources.files }}"
  loop_control:
    label: "{{ dotfiles_link_dest_dir }}/{{ item.path | basename }}"
